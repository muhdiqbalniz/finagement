<div id="savings-deposit-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Log Savings Allocation Transfer</h3>
                <span class="close-trigger" onclick="toggleModal('savings-deposit-modal', false)">&times;</span>
            </div>
            <input type="hidden" id="save-target-index" value="-1">
            <div class="input-group">
                <label>Date of Allocation Transfer</label>
                <input type="date" id="save-date-field">
            </div>
            <div class="input-group">
                <label>Amount Transferred to Vault (RM)</label>
                <input type="number" id="save-amount-field" placeholder="0.00" step="0.01">
            </div>
            <button class="btn btn-action" onclick="submitSavingsGoalDeposit()">Execute Vault Deposit</button>
        </div>
    </div>

    <div id="debt-repay-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Log Liability Repayment Entry</h3>
                <span class="close-trigger" onclick="toggleModal('debt-repay-modal', false)">&times;</span>
            </div>
            <input type="hidden" id="repay-target-index" value="-1">
            <div class="input-group">
                <label>Repayment Installment Date</label>
                <input type="date" id="repay-date-field">
            </div>
            <div class="input-group">
                <label>Total Remitted Principal Amount (RM)</label>
                <input type="number" id="repay-amount-field" placeholder="0.00" step="0.01">
            </div>
            <button class="btn btn-primary" onclick="submitDebtRepayment()">Post Repayment Line</button>
        </div>
    </div>

    <div id="profile-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Account Registry Profile Matrix</h3>
                <span class="close-trigger" onclick="toggleModal('profile-modal', false)">&times;</span>
            </div>
            <div class="card" style="background: var(--bg-primary); text-align: center; padding: 20px; border-radius: 12px;">
                <div style="font-size: 40px; margin-bottom: 8px;">👤</div>
                <div id="lbl-user-display" style="font-weight: 800; font-size: 18px;">Active Node Profile</div>
                <div id="lbl-cloud-sync-meta" style="font-size: 12px; color: var(--text-muted); margin-top: 4px;">Local Mode Cache</div>
            </div>
            <div class="input-group">
                <label>Active Display UI Mode</label>
                <select id="cfg-app-theme-selector" onchange="applyVisualThemeMatrix()">
                    <option value="light">Sophisticated Light Mode</option>
                    <option value="dark">Industrial Slate Dark Mode</option>
                </select>
            </div>
            <button class="btn btn-primary" style="margin-bottom: 8px; background-color: var(--color-alert);" onclick="executeSessionLogout()">Disconnect &amp; Logout</button>
            <button class="btn" style="background: var(--border-color); color: var(--text-main);" onclick="toggleModal('profile-modal', false)">Close View</button>
        </div>
    </div>

    <script>
        // Core Storage Structure Definition Matrix
        let localEngine = {
            currentUser: "guest",
            theme: "light",
            dismissedOnboarding: false,
            months: {},
            savings: [],
            debts: []
        };

        let currentMonthKey = "";
        let globalRatioInputMode = "slider"; // slider or manual

        const BACKEND_STORAGE_KEY = "FINAGEMENT_PRO_ENGINE_DATA_V2";

        // Application Lifecycles Initialization Hook
        window.addEventListener('DOMContentLoaded', () => {
            initializeSystemDefaults();
            loadEngineStateFromStorage();
            setupCurrentDateFields();
        });

        function setupCurrentDateFields() {
            const todayStr = new Date().toISOString().split('T')[0];
            ['log-date-field', 'save-date-field', 'repay-date-field'].forEach(id => {
                const el = document.getElementById(id);
                if (el) el.value = todayStr;
            });
        }

        function initializeSystemDefaults() {
            const date = new Date();
            currentMonthKey = `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}`;
        }

        function loadEngineStateFromStorage() {
            try {
                const cache = localStorage.getItem(BACKEND_STORAGE_KEY);
                if (cache) {
                    localEngine = JSON.parse(cache);
                }
            } catch (e) {
                console.error("Local state recovery aborted.", e);
            }

            if (!localEngine.months) localEngine.months = {};
            if (!localEngine.savings) localEngine.savings = [];
            if (!localEngine.debts) localEngine.debts = [];
            if (!localEngine.theme) localEngine.theme = "light";

            applyVisualThemeMatrix(localEngine.theme);
            document.getElementById('cfg-app-theme-selector').value = localEngine.theme;

            if (localEngine.currentUser && localEngine.currentUser !== "guest") {
                bypassAuthToAppWrapper();
            } else {
                toggleAuthWrapperLayer(true);
            }
        }

        function commitDatabase() {
            localStorage.setItem(BACKEND_STORAGE_KEY, JSON.stringify(localEngine));
            updateSynchronousStatusIndicator("Saved Local");
        }

        function updateSynchronousStatusIndicator(text) {
            const el = document.getElementById('sync-status');
            if (el) el.textContent = text;
        }

        // Authentication Controller Pipeline Matrix
        function toggleAuthWrapperLayer(showLogin) {
            document.getElementById('login-screen').style.display = showLogin ? 'flex' : 'none';
            document.getElementById('app-wrapper').style.display = showLogin ? 'none' : 'block';
        }

        function toggleAuthForms(toSignUp) {
            document.getElementById('card-auth-login').style.display = toSignUp ? 'none' : 'block';
            document.getElementById('card-auth-signup').style.display = toSignUp ? 'block' : 'none';
        }

        function executeCloudLogin() {
            const user = document.getElementById('login-user').value.trim();
            const pass = document.getElementById('login-pass').value.trim();

            if (!user || !pass) {
                showAuthError('login-error', 'Enter valid system credentials.');
                return;
            }

            localEngine.currentUser = user;
            commitDatabase();
            bypassAuthToAppWrapper();
        }

        function executeCloudSignUp() {
            const user = document.getElementById('signup-user').value.trim();
            const pass = document.getElementById('signup-pass').value.trim();

            if (!user || !pass) {
                showAuthError('signup-error', 'Operational parameters invalid.');
                return;
            }

            localEngine.currentUser = user;
            localEngine.dismissedOnboarding = false;
            commitDatabase();
            bypassAuthToAppWrapper();
        }

        function showAuthError(targetId, msg) {
            const el = document.getElementById(targetId);
            el.textContent = msg;
            el.style.display = 'block';
        }

        function bypassAuthToAppWrapper() {
            toggleAuthWrapperLayer(false);
            document.getElementById('lbl-user-display').textContent = localEngine.currentUser;
            
            if (!localEngine.dismissedOnboarding) {
                document.getElementById('new-user-walkthrough-panel').style.display = 'block';
            }

            verifyAndBuildActiveMonthTrackers();
            populateMonthNavigationDropdownList();
            refreshInterfaceRoutines();
        }

        function executeSessionLogout() {
            if (confirm("Disconnect database sync profiles? Data remains in local browser storage.")) {
                localEngine.currentUser = "guest";
                commitDatabase();
                toggleModal('profile-modal', false);
                toggleAuthWrapperLayer(true);
            }
        }

        function dismissOnboardingTutorial() {
            localEngine.dismissedOnboarding = true;
            commitDatabase();
            document.getElementById('new-user-walkthrough-panel').style.display = 'none';
        }

        function applyVisualThemeMatrix(overrideTheme) {
            const targetTheme = overrideTheme || document.getElementById('cfg-app-theme-selector').value;
            document.documentElement.setAttribute('data-theme', targetTheme);
            localEngine.theme = targetTheme;
            commitDatabase();
        }

        // Framework View Router Matrices
        function navigatePage(viewId, tabRef) {
            document.querySelectorAll('.app-view').forEach(view => view.classList.remove('active'));
            document.querySelectorAll('.nav-tab').forEach(tab => tab.classList.remove('active'));
            
            document.getElementById(`page-${viewId}`).classList.add('active');
            if (tabRef) tabRef.classList.add('active');
            
            refreshInterfaceRoutines();
        }

        function toggleModal(modalId, shouldShow) {
            const modal = document.getElementById(modalId);
            if (shouldShow) {
                modal.classList.add('show');
            } else {
                modal.classList.remove('show');
            }
        }

        function toggleGuideBlock(guideId) {
            const el = document.getElementById(guideId);
            el.style.display = (el.style.display === 'none' || el.style.display === '') ? 'block' : 'none';
        }

        // Database Month Entry Allocation Routine Mechanics
        function verifyAndBuildActiveMonthTrackers() {
            if (!localEngine.months[currentMonthKey]) {
                localEngine.months[currentMonthKey] = {
                    payroll: { basic: 0, items: [] },
                    ratios: { needs: 50, wants: 30, savings: 20 },
                    manualCaps: { needs: 0, wants: 0, savings: 0 },
                    budgets: [],
                    expenses: []
                };
                propagateRecurringCommitments();
                commitDatabase();
            }
        }

        function propagateRecurringCommitments() {
            const keys = Object.keys(localEngine.months).sort();
            if (keys.length <= 1) return;
            
            const prevKey = keys[keys.length - 2];
            const prevMonth = localEngine.months[prevKey];
            const currMonth = localEngine.months[currentMonthKey];

            if (prevMonth && prevMonth.budgets) {
                prevMonth.budgets.forEach(b => {
                    if (b.recurring) {
                        currMonth.budgets.push({
                            ...b,
                            actual: 0
                        });
                    }
                });
            }
        }

        function populateMonthNavigationDropdownList() {
            const dropdown = document.getElementById('month-navigation-dropdown');
            dropdown.innerHTML = "";
            
            // Seed current month if empty
            verifyAndBuildActiveMonthTrackers();

            const uniqueMonths = Object.keys(localEngine.months).sort();
            const dateObj = new Date();
            const nextMonthStr = `${dateObj.getFullYear()}-${String(dateObj.getMonth() + 2).padStart(2, '0')}`;
            if (!uniqueMonths.includes(nextMonthStr)) {
                uniqueMonths.push(nextMonthStr);
            }

            uniqueMonths.forEach(mKey => {
                const opt = document.createElement('option');
                opt.value = mKey;
                
                const [year, month] = mKey.split('-');
                const labelDate = new Date(year, parseInt(month) - 1, 1);
                opt.textContent = labelDate.toLocaleDateString('en-US', { month: 'short', year: 'numeric' });
                
                if (mKey === currentMonthKey) opt.selected = true;
                dropdown.appendChild(opt);
            });
        }

        function executeMonthNavigationShift() {
            currentMonthKey = document.getElementById('month-navigation-dropdown').value;
            verifyAndBuildActiveMonthTrackers();
            refreshInterfaceRoutines();
        }

        function triggerCloudSync() {
            updateSynchronousStatusIndicator("Syncing Cloud...");
            setTimeout(() => {
                commitDatabase();
                updateSynchronousStatusIndicator("Synchronized Grid");
                alert("Finagement cloud database layers fully processed.");
            }, 800);
        }

        // Global Visual Refreshes Execution Pipeline
        function refreshInterfaceRoutines() {
            calculatePayrollNettOutput(false); 
            renderPayrollLinesContainers();
            updateBudgetRatiosInterface();
            renderExpenseDetailsTable();
            renderRecentOverviewLedger();
            renderSavingsTrackerLedger();
            renderDebtTrackerLedger();
            processGlobalSystemAlerts();
        }

        // Payroll & Income Engine Pipeline 
        function calculatePayrollNettOutput(shouldSave = true) {
            const mData = localEngine.months[currentMonthKey];
            if (!mData) return;

            const basicField = document.getElementById('pay-basic-salary');
            if (basicField && document.activeElement !== basicField) {
                basicField.value = mData.payroll.basic || "";
            }

            let nett = mData.payroll.basic || 0;
            mData.payroll.items.forEach(item => {
                if (item.type === 'allowance') nett += item.val;
                if (item.type === 'deduction') nett -= item.val;
            });

            document.getElementById('computed-nett-label').textContent = nett.toLocaleString('en-US', {minimumFractionDigits: 2}) + ' RM';
            
            if (shouldSave) commitDatabase();
            updateBudgetRatiosInterface();
        }

        function renderPayrollLinesContainers() {
            const mData = localEngine.months[currentMonthKey];
            const allowContainer = document.getElementById('allowances-container');
            const deductContainer = document.getElementById('deductions-container');

            allowContainer.innerHTML = "";
            deductContainer.innerHTML = "";

            mData.payroll.items.forEach((item, index) => {
                const row = document.createElement('div');
                row.className = "payroll-item-row";
                row.innerHTML = `
                    <input type="text" value="${item.label}" placeholder="Label Description" onchange="updatePayrollLineItem(${index}, 'label', this.value)">
                    <input type="number" value="${item.val}" placeholder="0.00" step="0.01" onchange="updatePayrollLineItem(${index}, 'val', parseFloat(this.value))">
                    <button class="btn-trash" onclick="deletePayrollLineItem(${index})">✕</button>
                `;
                if (item.type === 'allowance') {
                    allowContainer.appendChild(row);
                } else {
                    deductContainer.appendChild(row);
                }
            });
        }

        function addPayrollRow(type, label, val) {
            localEngine.months[currentMonthKey].payroll.items.push({ type, label, val });
            commitDatabase();
            renderPayrollLinesContainers();
            calculatePayrollNettOutput();
        }

        function updatePayrollLineItem(index, key, val) {
            const item = localEngine.months[currentMonthKey].payroll.items[index];
            if (item) {
                if (key === 'val') {
                    item.val = isNaN(val) ? 0 : val;
                } else {
                    item[key] = val;
                }
                calculatePayrollNettOutput();
            }
        }

        function deletePayrollLineItem(index) {
            localEngine.months[currentMonthKey].payroll.items.splice(index, 1);
            commitDatabase();
            renderPayrollLinesContainers();
            calculatePayrollNettOutput();
        }

        function triggerManualPreviousMonthPayrollCopy() {
            const keys = Object.keys(localEngine.months).sort();
            const currentIdx = keys.indexOf(currentMonthKey);
            if (currentIdx <= 0) return alert("No preceding transaction ledger month records established.");
            
            const prevMonth = localEngine.months[keys[currentIdx - 1]];
            if (prevMonth && prevMonth.payroll) {
                localEngine.months[currentMonthKey].payroll = JSON.parse(JSON.stringify(prevMonth.payroll));
                commitDatabase();
                refreshInterfaceRoutines();
            }
        }

        // Target Ratios Allocation Balance Framework Matrix
        function toggleRatioInputMode() {
            const btn = document.getElementById('btn-toggle-ratio-mode');
            if (globalRatioInputMode === "slider") {
                globalRatioInputMode = "manual";
                btn.textContent = "🎚️ Switch to Sliders Mode";
                document.getElementById('ratio-sliders-container').style.display = 'none';
                document.getElementById('ratio-manual-container').style.display = 'block';
            } else {
                globalRatioInputMode = "slider";
                btn.textContent = "⌨️ Switch to Manual Input";
                document.getElementById('ratio-sliders-container').style.display = 'block';
                document.getElementById('ratio-manual-container').style.display = 'none';
            }
            updateBudgetRatiosInterface();
        }

        function getNettPayEngineComputation() {
            const mData = localEngine.months[currentMonthKey];
            let nett = mData.payroll.basic || 0;
            mData.payroll.items.forEach(item => {
                if (item.type === 'allowance') nett += item.val;
                if (item.type === 'deduction') nett -= item.val;
            });
            return nett;
        }

        function balanceRatios(changedPool) {
            const mData = localEngine.months[currentMonthKey];
            let slNeeds = parseInt(document.getElementById('sl-needs').value);
            let slWants = parseInt(document.getElementById('sl-wants').value);
            let slSavings = parseInt(document.getElementById('sl-savings').value);

            let sum = slNeeds + slWants + slSavings;
            if (sum !== 100) {
                const diff = 100 - sum;
                if (changedPool === 'needs') {
                    slWants += diff;
                    if (slWants < 0) { slSavings += slWants; slWants = 0; }
                    else if (slWants > 100) { slWants = 100; slSavings = 0; }
                } else if (changedPool === 'wants') {
                    slSavings += diff;
                    if (slSavings < 0) { slNeeds += slSavings; slSavings = 0; }
                } else {
                    slNeeds += diff;
                    if (slNeeds < 0) { slWants += slNeeds; slNeeds = 0; }
                }
            }

            mData.ratios.needs = Math.max(0, Math.min(100, slNeeds));
            mData.ratios.wants = Math.max(0, Math.min(100, slWants));
            mData.ratios.savings = Math.max(0, Math.min(100, slSavings));

            commitDatabase();
            updateBudgetRatiosInterface();
        }

        function processManualRatioInputs() {
            const mData = localEngine.months[currentMonthKey];
            mData.manualCaps.needs = parseFloat(document.getElementById('num-exact-needs').value) || 0;
            mData.manualCaps.wants = parseFloat(document.getElementById('num-exact-wants').value) || 0;
            mData.manualCaps.savings = parseFloat(document.getElementById('num-exact-savings').value) || 0;
            commitDatabase();
            updateBudgetRatiosInterface();
        }

        function updateBudgetRatiosInterface() {
            const mData = localEngine.months[currentMonthKey];
            const nett = getNettPayEngineComputation();

            let needsCap = 0, wantsCap = 0, savingsCap = 0;
            const banner = document.getElementById('allocation-discrepancy-banner');

            if (globalRatioInputMode === "slider") {
                document.getElementById('sl-needs').value = mData.ratios.needs;
                document.getElementById('sl-wants').value = mData.ratios.wants;
                document.getElementById('sl-savings').value = mData.ratios.savings;

                needsCap = (nett * mData.ratios.needs) / 100;
                wantsCap = (nett * mData.ratios.wants) / 100;
                savingsCap = (nett * mData.ratios.savings) / 100;

                document.getElementById('v-pct-needs').textContent = `${mData.ratios.needs}% (${needsCap.toLocaleString('en-US', {minimumFractionDigits: 2})} RM)`;
                document.getElementById('v-pct-wants').textContent = `${mData.ratios.wants}% (${wantsCap.toLocaleString('en-US', {minimumFractionDigits: 2})} RM)`;
                document.getElementById('v-pct-savings').textContent = `${mData.ratios.savings}% (${savingsCap.toLocaleString('en-US', {minimumFractionDigits: 2})} RM)`;
                banner.style.display = 'none';
            } else {
                needsCap = mData.manualCaps.needs;
                wantsCap = mData.manualCaps.wants;
                savingsCap = mData.manualCaps.savings;

                document.getElementById('num-exact-needs').value = needsCap || "";
                document.getElementById('num-exact-wants').value = wantsCap || "";
                document.getElementById('num-exact-savings').value = savingsCap || "";

                const allocationTotal = needsCap + wantsCap + savingsCap;
                if (allocationTotal > nett) {
                    banner.className = "alert-text-color";
                    banner.style.background = "rgba(255,59,48,0.1)";
                    banner.textContent = `⚠️ Warning: Allocations exceed current calculated Nett Pay parameters by ${(allocationTotal - nett).toFixed(2)} RM!`;
                    banner.style.display = 'block';
                } else if (allocationTotal < nett) {
                    banner.className = "warning-text-color";
                    banner.style.background = "rgba(255,149,0,0.1)";
                    banner.textContent = `💡 Info: ${(nett - allocationTotal).toFixed(2)} RM remains completely unallocated to category targets.`;
                    banner.style.display = 'block';
                } else {
                    banner.style.display = 'none';
                }
            }

            // Sync aggregate summaries back into Overview
            let totalSpent = 0;
            mData.expenses.forEach(e => totalSpent += e.cost);

            let remainingBalance = nett - totalSpent;
            document.getElementById('main-real-balance').textContent = remainingBalance.toLocaleString('en-US', {minimumFractionDigits: 2}) + ' RM';
            document.getElementById('lbl-inc-base').textContent = nett.toLocaleString('en-US', {minimumFractionDigits: 2});
            document.getElementById('lbl-spent-base').textContent = totalSpent.toLocaleString('en-US', {minimumFractionDigits: 2});

            // Calculate Pool Spending Distributions
            let spentNeeds = 0, spentWants = 0, spentSavings = 0;
            mData.expenses.forEach(e => {
                if (e.group === "Needs") spentNeeds += e.cost;
                if (e.group === "Wants") spentWants += e.cost;
                if (e.group === "Savings") spentSavings += e.cost;
            });

            document.getElementById('lbl-pool-needs').textContent = `${(needsCap - spentNeeds).toLocaleString('en-US', {minimumFractionDigits: 2})} RM left`;
            document.getElementById('lbl-pool-wants').textContent = `${(wantsCap - spentWants).toLocaleString('en-US', {minimumFractionDigits: 2})} RM left`;
            document.getElementById('lbl-pool-savings').textContent = `${(savingsCap - spentSavings).toLocaleString('en-US', {minimumFractionDigits: 2})} RM left`;
        }

        // Budget Configurations Framework Layer
        function updateFormWarningLabel() {
            const pct = document.getElementById('cfg-warning-pct').value;
            const lbl = document.getElementById('cfg-warning-label');
            if (pct == 100) {
                lbl.textContent = "Disabled (100%)";
                lbl.style.color = "var(--text-muted)";
            } else {
                lbl.textContent = `Alert at ${pct}%`;
                lbl.style.color = "var(--color-wants)";
            }
        }

        function commitCustomBudgetItem() {
            const mData = localEngine.months[currentMonthKey];
            const name = document.getElementById('cfg-item-name').value.trim();
            const cap = parseFloat(document.getElementById('cfg-item-cap').value);
            const group = document.getElementById('cfg-item-group').value;
            const recurring = document.getElementById('cfg-item-recurring').checked;
            const alertPct = parseInt(document.getElementById('cfg-warning-pct').value);
            const editIdx = parseInt(document.getElementById('cfg-editing-index').value);

            if (!name || isNaN(cap) || cap <= 0) return alert("Verify core allocation target constraints execution parameters.");

            const budgetObj = { name, cap, group, recurring, alertPct };

            if (editIdx >= 0) {
                mData.budgets[editIdx] = budgetObj;
            } else {
                mData.budgets.push(budgetObj);
            }

            commitDatabase();
            clearBudgetForm();
            refreshInterfaceRoutines();
        }

        function clearBudgetForm() {
            document.getElementById('cfg-editing-index').value = "-1";
            document.getElementById('cfg-item-name').value = "";
            document.getElementById('cfg-item-cap').value = "";
            document.getElementById('cfg-item-recurring').checked = false;
            document.getElementById('cfg-warning-pct').value = 100;
            document.getElementById('budget-form-heading').textContent = "Create / Update Target Allocations";
            document.getElementById('btn-cancel-budget-edit').style.display = 'none';
            updateFormWarningLabel();
        }

        function loadBudgetEditPreset(index) {
            const b = localEngine.months[currentMonthKey].budgets[index];
            if (!b) return;

            document.getElementById('cfg-editing-index').value = index;
            document.getElementById('cfg-item-name').value = b.name;
            document.getElementById('cfg-item-cap').value = b.cap;
            document.getElementById('cfg-item-group').value = b.group;
            document.getElementById('cfg-item-recurring').checked = !!b.recurring;
            document.getElementById('cfg-warning-pct').value = b.alertPct || 100;
            
            document.getElementById('budget-form-heading').textContent = `Editing Budget: ${b.name}`;
            document.getElementById('btn-cancel-budget-edit').style.display = 'inline-block';
            updateFormWarningLabel();
        }

        function purgeBudgetProfileLine(index) {
            if (confirm("Erase target structural allocation constraints records?")) {
                localEngine.months[currentMonthKey].budgets.splice(index, 1);
                commitDatabase();
                refreshInterfaceRoutines();
            }
        }

        function triggerManualPreviousMonthCopy() {
            const keys = Object.keys(localEngine.months).sort();
            const currentIdx = keys.indexOf(currentMonthKey);
            if (currentIdx <= 0) return alert("No preceding tracking months found.");
            
            const prevMonth = localEngine.months[keys[currentIdx - 1]];
            if (prevMonth && prevMonth.budgets) {
                const currentMonthBudgets = localEngine.months[currentMonthKey].budgets;
                prevMonth.budgets.forEach(pb => {
                    if (!currentMonthBudgets.some(cb => cb.name === pb.name)) {
                        currentMonthBudgets.push({ ...pb, actual: 0 });
                    }
                });
                commitDatabase();
                refreshInterfaceRoutines();
            }
        }

        function renderExpenseDetailsTable() {
            const mData = localEngine.months[currentMonthKey];
            const hook = document.getElementById('details-table-hook');
            const filter = document.getElementById('ledger-category-filter').value;

            hook.innerHTML = "";

            // Dynamic aggregate map logic computation
            const usageMap = {};
            mData.expenses.forEach(e => {
                const mapKey = `${e.group}_${e.item}`;
                usageMap[mapKey] = (usageMap[mapKey] || 0) + e.cost;
            });

            mData.budgets.forEach((b, idx) => {
                if (filter !== "ALL" && b.group !== filter) return;

                const actualCost = usageMap[`${b.group}_${b.name}`] || 0;
                const pctUsed = b.cap > 0 ? (actualCost / b.cap) * 100 : 0;
                
                let rowStateClass = "";
                if (b.alertPct && b.alertPct < 100 && pctUsed >= b.alertPct) rowStateClass = "warning-text-color";
                if (pctUsed >= 100) rowStateClass = "alert-text-color u-bold";

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="row-name ${rowStateClass}">${b.name} ${b.recurring ? '🔄' : ''}</td>

            if (!name || isNaN(total) || total <= 0) return alert("Verify target execution parameters.");

            const goalObj = { name, total, base, monthly, autoBind };

            if (editIdx >= 0) {
                localEngine.savings[editIdx] = goalObj;
            } else {

                if (autoBind) {
                    addBudgetTrackerBaselineImplicit("Savings", name, monthly);

            commitDatabase();
            clearSavingsForm();
            refreshInterfaceRoutines();

        function renderSavingsTrackerLedger() {
            const hook = document.getElementById('savings-list-hook');
            hook.innerHTML = "";

            let aggregateTotalVault = 0;

            // Pre-calculate mapped allocations totals across system memory pools
            const savingsAccumulationMap = {};
            Object.keys(localEngine.months).forEach(mKey => {
                localEngine.months[mKey].expenses.forEach(e => {
                    if (e.group === "Savings" && e.item.startsWith("Deposit: ")) {
                        const targetGoalName = e.item.replace("Deposit: ", "");

                    }
                });
            });

            localEngine.savings.forEach((s, idx) => {
                const subTotalInjected = savingsAccumulationMap[s.name] || 0;
                const netSavedValue = s.base + subTotalInjected;
                aggregateTotalVault += netSavedValue;

                const progressPct = Math.min(100, (netSavedValue / s.total) * 100);

                const block = document.createElement('div');
                block.className = "budget-progress-item";
                block.style.marginTop = "14px";
                block.innerHTML = `
                    <div class="progress-meta">
                        <span>${s.name}</span>
                        <span class="c-savings">${netSavedValue.toLocaleString()} / ${s.total.toLocaleString()} RM</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" style="width: ${progressPct}%; background-color: var(--color-savings);"></div>
                    </div>
                    <div style="text-align: right; margin-top: 6px; display: flex; justify-content: space-between; align-items: center;">
                        <span style="font-size:11px; color:var(--text-muted);">Allocation Target: ${s.monthly} RM/mo</span>

                        </div>
                    </div>
                `;
                hook.appendChild(block);
            });

            document.getElementById('savings-aggregate-summary').textContent = aggregateTotalVault.toLocaleString('en-US', {minimumFractionDigits: 2}) + ' RM';
        }

        function renderDebtTrackerLedger() {
            const hook = document.getElementById('debt-list-hook');
            hook.innerHTML = "";

            let totalOutstandingLiability = 0;

            const debtAmortizationMap = {};
            Object.keys(localEngine.months).forEach(mKey => {
                localEngine.months[mKey].expenses.forEach(e => {
                    if (e.group === "Needs" && e.item.startsWith("Repayment: ")) {
                        const targetDebtName = e.item.replace("Repayment: ", "");
                        debtAmortizationMap[targetDebtName] = (debtAmortizationMap[targetDebtName] || 0) + e.cost;
                    }
                });
            });

            localEngine.debts.forEach((d, idx) => {
                const totalRemittedRepayments = debtAmortizationMap[d.name] || 0;
                const netOutstandingPrincipal = Math.max(0, d.total - totalRemittedRepayments);
                totalOutstandingLiability += netOutstandingPrincipal;

                const remainingPct = d.total > 0 ? (netOutstandingPrincipal / d.total) * 100 : 0;

                const block = document.createElement('div');
                block.className = "budget-progress-item";
                block.style.marginTop = "14px";
                block.innerHTML = `
                    <div class="progress-meta">
                        <span>${d.name}</span>
                        <span class="alert-text-color">${netOutstandingPrincipal.toLocaleString()} / ${d.total.toLocaleString()} RM</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" style="width: ${remainingPct}%; background-color: var(--color-alert);"></div>
                    </div>
                    <div style="text-align: right; margin-top: 6px; display: flex; justify-content: space-between; align-items: center;">
                        <span style="font-size:11px; color:var(--text-muted);">Installment Target: ${d.installment} RM/mo</span>
                        <div>
                            <button class="btn-inline-pay" style="color: var(--color-needs); background: rgba(0,122,255,0.1);" onclick="triggerInlineRepaymentSheet(${idx})">Pay</button>

                        </div>
                    </div>
                `;
                hook.appendChild(block);
            });

            document.getElementById('debt-aggregate-summary').textContent = totalOutstandingLiability.toLocaleString('en-US', {minimumFractionDigits: 2}) + ' RM';
        }

        function addBudgetTrackerBaselineImplicit(group, name, cap) {
            const mData = localEngine.months[currentMonthKey];
            if (mData && !mData.budgets.some(b => b.name === name)) {
                mData.budgets.push({
                    name,
                    cap,
                    group,
                    recurring: true,
                    alertPct: 100
                });
            }
        }

        // Global Alert Center Optimization Engine Logic
        function processGlobalSystemAlerts() {
            const mData = localEngine.months[currentMonthKey];
            const alertBox = document.getElementById('alert-warning-card');
            const hook = document.getElementById('alert-items-hook');

            hook.innerHTML = "";
            let triggerAlertFlag = false;

            const usageMap = {};
            mData.expenses.forEach(e => {
                const k = `${e.group}_${e.item}`;
                usageMap[k] = (usageMap[k] || 0) + e.cost;
            });

            mData.budgets.forEach(b => {
                const actual = usageMap[`${b.group}_${b.name}`] || 0;
                if (b.cap > 0) {
                    const pct = (actual / b.cap) * 100;
                    if (pct >= 100) {
                        triggerAlertFlag = true;
                        hook.innerHTML += `<div style="font-size:13px; margin-bottom:4px; font-weight:700;" class="alert-text-color">🛑 allocation parameter breach: [${b.group}] ${b.name} strictly exhausted (${pct.toFixed(0)}%).</div>`;
                    } else if (b.alertPct && b.alertPct < 100 && pct >= b.alertPct) {
                        triggerAlertFlag = true;
                        hook.innerHTML += `<div style="font-size:13px; margin-bottom:4px; font-weight:600;" class="warning-text-color">⚠️ dynamic warning metric milestone: [${b.group}] ${b.name} baseline crossed velocity threshold (${pct.toFixed(0)}%).</div>`;
                    }
                }
            });

            alertBox.style.display = triggerAlertFlag ? 'block' : 'none';
        }

        // =========================================================================
        // GEMINI AI INTEGRATED INTELLIGENCE PLATFORM AGENT CORE
        // =========================================================================
        
        function executeConversationalAILog() {
            const promptInput = document.getElementById('ai-natural-input-field');
            const rawText = promptInput.value.trim();
            if (!rawText) return;

            const spinner = document.getElementById('ai-processing-notice');
            spinner.style.display = "block";

            // Advanced Regular Expression Semantic Extraction Matrix Rules
            setTimeout(() => {
                let parseMatched = false;
                let extractedAmount = null;
                let extractedItem = "Unspecified Transaction Log";
                let computedCategory = "Wants";

                // Extract digit structures representing funds values
                const currencyRegex = /(\d+(?:\.\d{1,2})?)\s*(?:rm|ringgit|bucks|dollars)/i;
                const matches = rawText.match(currencyRegex);
                if (matches && matches[1]) {
                    extractedAmount = parseFloat(matches[1]);
                    parseMatched = true;
                } else {
                    const alternativeRegex = /(?:spent|paid|cost|remitted)\s*(\d+(?:\.\d{1,2})?)/i;
                    const altMatches = rawText.match(alternativeRegex);
                    if (altMatches && altMatches[1]) {
                        extractedAmount = parseFloat(altMatches[1]);
                        parseMatched = true;
                    }
                }

                if (!parseMatched) {
                    spinner.style.display = "none";
                    alert("Gemini Natural Parsing Node was unable to isolate transaction velocity figures in string phrase.");
                    return;
                }

                // Isolate description strings text criteria parameters
                const descriptionSanitizerList = [
                    /(?:spent|paid|logged)\s+\d+(?:\.\d{2})?\s*(?:rm)?\s*(?:on|for)\s+([^.]+)/i,
                    /(?:spent|paid|logged)\s+([^.]+)\s+(?:costing|amounting|totaling)?\s*\d+/i,
                    /([^.]+)\s+(?:spent|paid|cost)\s+\d+/i
                ];

                for (let regex of descriptionSanitizerList) {
                    const descMatch = rawText.match(regex);
                    if (descMatch && descMatch[1]) {
                        extractedItem = descMatch[1].trim();
                        break;
                    }
                }

                // AI Structural Taxonomy Matrix Engine Inference Block
                const lowerText = rawText.toLowerCase();
                const taxonomyNeedsPoolKeywords = ['groceries', 'rent', 'utility', 'electric', 'bill', 'petrol', 'fuel', 'tnb', 'repayment', 'loan', 'insurance', 'medical', 'car'];
                const taxonomySavingsPoolKeywords = ['vault', 'deposit', 'invest', 'stock', 'shares', 'emergency', 'backup', 'crypto', 'savings', 'gold'];

                if (taxonomyNeedsPoolKeywords.some(keyword => lowerText.includes(keyword))) {
                    computedCategory = "Needs";
                } else if (taxonomySavingsPoolKeywords.some(keyword => lowerText.includes(keyword))) {
                    computedCategory = "Savings";
                }

                // Automated execution binding loop logic
                const mData = localEngine.months[currentMonthKey];
                
                // Assert structural baseline exists inside targets arrays match
                if (!mData.budgets.some(b => b.name.toLowerCase() === extractedItem.toLowerCase())) {
                    mData.budgets.push({
                        name: extractedItem,
                        cap: extractedAmount * 2, 
                        group: computedCategory,
                        recurring: false,
                        alertPct: 100
                    });
                }

                mData.expenses.unshift({
                    id: Date.now(),
                    date: new Date().toISOString().split('T')[0],
                    item: extractedItem,
                    group: computedCategory,
                    cost: extractedAmount
                });

                commitDatabase();
                spinner.style.display = "none";
                promptInput.value = "";
                refreshInterfaceRoutines();

                // Trigger Contextual Neural Insights Card Layer
                triggerPredictiveForecastInsightCard(extractedItem, extractedAmount, computedCategory);

            }, 750);
        }

        function triggerPredictiveForecastInsightCard(item, cost, category) {
            const card = document.getElementById('ai-predictive-insight-card');
            const content = document.getElementById('ai-insight-text-content');
            
            card.style.display = "block";
            
            let structuralForecastVectorText = `Isolated transactional vector on item <strong>"${item}"</strong> allocation inside <strong>${category} Pool Space</strong>. `;
            if (category === "Wants") {
                structuralForecastVectorText += `Gemini tracking parameters suggest structural constraints optimizations here could accelerate your milestone goals timeline boundaries by up to 14%.`;
            } else if (category === "Needs") {
                structuralForecastVectorText += `Fixed essential commitment structural baseline update saved. Safe limits buffers maintained.`;
            } else {
                structuralForecastVectorText += `Excellent capital compounding tracking behavior patterns detected. System asset metrics improving.`;
            }

            content.innerHTML = structuralForecastVectorText;
        }

        function executeAISheetStructureMap() {
            const pasteData = document.getElementById('ai-csv-import-box').value.trim();
            if (!pasteData) return alert("Paste raw schema values strings into tracking bounds mapping area.");

            alert("Gemini Spreadsheet Column Schema Mapper normalized tabular structures. Extracted rows mapped seamlessly into monthly tracker budgets baseline.");
            
            // Generate clean simulated tracking properties arrays parameters schema matching index.html
            const lines = pasteData.split('\n');
            let rowsInjectedCounter = 0;

            lines.forEach(line => {
                if (line.toLowerCase().includes('date') || line.toLowerCase().includes('amount') || !line.includes(',')) return;
                const parts = line.split(',');
                if (parts.length >= 2) {
                    const name = parts[1].trim();
                    const val = parseFloat(parts[2]) || 50.00;
                    if (name) {
                        addBudgetTrackerBaselineImplicit("Wants", name, val * 1.5);
                        rowsInjectedCounter++;
                    }
                }
            });

            if (rowsInjectedCounter > 0) {
                commitDatabase();
                refreshInterfaceRoutines();
                document.getElementById('ai-csv-import-box').value = "";
            }
        }
